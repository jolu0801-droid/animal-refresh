name: Refresh animal data 

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Refresh animal data
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python3 tools/push-animals-kv.py

      - name: Save progress
        run: |
          git config user.name "refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f tools/.animals-push-state.json
          git diff --cached --quiet || git commit -m "refresh state [skip ci]"
          git push
